<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered Sentiment Analyzer tool built with React.">
    <title>Sentiment Analyzer | React</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --bg: #09090b; --card: rgba(255,255,255,0.03); --txt: #fff; --muted: #a1a1aa;
            --pos: #10b981; --neg: #ef4444; --neu: #8b5cf6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background: var(--bg) radial-gradient(at 0% 0%, rgba(139,92,246,0.15) 0, transparent 50%);
            color: var(--txt); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        .container {
            width: 100%; max-width: 600px; background: var(--card); backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); animation: fadeIn 0.6s ease forwards;
        }
        h1 {
            font-size: 2.2rem; text-align: center; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p.subtitle { text-align: center; color: var(--muted); margin-bottom: 1.5rem; font-size: 0.95rem; }
        textarea {
            width: 100%; min-height: 120px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 1rem; color: #fff; font-size: 1rem; margin-bottom: 1rem; resize: vertical;
            transition: all 0.3s;
        }
        textarea:focus { outline: none; border-color: rgba(255,255,255,0.4); background: rgba(0,0,0,0.6); }
        button {
            width: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 1rem; border-radius: 16px; font-size: 1.05rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); background: rgba(255,255,255,0.15); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .result {
            margin-top: 1.5rem; padding: 1.5rem; border-radius: 20px; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1); text-align: center; animation: fadeIn 0.5s ease forwards;
        }
        .badge {
            display: inline-block; padding: 0.5rem 1.5rem; border-radius: 99px; font-weight: 700;
            font-size: 1.2rem; text-transform: uppercase; margin-bottom: 1rem;
        }
        .badge.positive { background: rgba(16,185,129,0.15); color: var(--pos); border: 1px solid rgba(16,185,129,0.3); }
        .badge.negative { background: rgba(239,68,68,0.15); color: var(--neg); border: 1px solid rgba(239,68,68,0.3); }
        .badge.neutral { background: rgba(139,92,246,0.15); color: var(--neu); border: 1px solid rgba(139,92,246,0.3); }
        
        .bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin: 0.5rem 0; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .bar-fill.positive { background: var(--pos); }
        .bar-fill.negative { background: var(--neg); }
        .bar-fill.neutral { background: var(--neu); }
        
        .flex-between { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.9rem; }
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    {% raw %}
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [text, setText] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');

            const analyze = async () => {
                if (!text.trim()) {
                    setError('Please enter some text');
                    return;
                }
                setLoading(true);
                setError('');
                setResult(null);

                try {
                    const res = await fetch('/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to analyze');
                    setResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <h1>Sentiment Analyzer</h1>
                    <p className="subtitle">Enter text to instantly detect its sentiment</p>
                    
                    <textarea 
                        value={text}
                        onChange={(e) => { setText(e.target.value); setError(''); }}
                        placeholder="Type your statement here... (e.g. 'I absolutely love this new design!')"
                        onKeyDown={(e) => e.key === 'Enter' && (e.ctrlKey || e.metaKey) && analyze()}
                    />
                    
                    {error && <div style={{color: 'var(--neg)', marginBottom: '1rem', textAlign: 'center'}}>{error}</div>}

                    <button onClick={analyze} disabled={loading || !text.trim()}>
                        {loading ? <div className="spinner" /> : 'Analyze Sentiment'}
                    </button>

                    {result && (
                        <div className="result">
                            <div className={`badge ${result.sentiment.toLowerCase()}`}>
                                {result.sentiment}
                            </div>
                            
                            <div style={{textAlign: 'left'}}>
                                <div className="flex-between">
                                    <span>Confidence Score</span>
                                    <span>{Math.round(result.confidence * 100)}%</span>
                                </div>
                                <div className="bar-bg">
                                    <div 
                                        className={`bar-fill ${result.sentiment.toLowerCase()}`}
                                        style={{width: `${Math.round(result.confidence * 100)}%`}}
                                    />
                                </div>
                            </div>
                            
                            <div className="flex-between" style={{marginTop: '1rem', justifyContent: 'center', gap: '1.5rem'}}>
                                <span>Pos: {Math.round(result.probabilities.positive * 100)}%</span>
                                <span>Neg: {Math.round(result.probabilities.negative * 100)}%</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    {% endraw %}
</body>
</html>
